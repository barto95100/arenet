#
# Step S.4 — multi-arch Docker release workflow.
#
# Triggers:
#   - Push of a v* tag (e.g. v1.0.0): runs the full build +
#     publish to ghcr.io, tagging the image with both the version
#     and (only on stable tags) "latest".
#   - Manual workflow_dispatch: dry-run path with no registry
#     push. Useful for verifying the buildx setup before cutting
#     a real release tag.
#
# Stable tag detection: a tag is "stable" iff it matches
# v[0-9]+.[0-9]+.[0-9]+ (no -rc / -beta / -alpha / -step-... ).
# Stable tags get the "latest" alias; everything else is the
# version tag only (per spec D9 — and per the historical project
# convention of v1.4.0-step-r-spec being a pre-arbitrage marker,
# v1.0.0-step-s-spec the transitional pivot tag, etc.).

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this? (telemetry only)'
        required: false
        default: 'dry-run buildx verification'

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: Build &amp; publish multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version + stable flag
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            # workflow_dispatch — use the short SHA so the dry-run
            # tag is unique but obviously not a release.
            VERSION="dispatch-${GITHUB_SHA::7}"
          fi
          # Stable iff strictly v<major>.<minor>.<patch>.
          if printf '%s\n' "${VERSION}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            STABLE=true
          else
            STABLE=false
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "stable=${STABLE}" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${VERSION} stable=${STABLE}"

      - name: Set up QEMU (for arm64 cross-compile)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Skip the login step on workflow_dispatch dry-runs so the
        # action remains usable from a fork without registry creds.
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/arenet"
          TAGS="${IMAGE}:${{ steps.meta.outputs.version }}"
          if [ "${{ steps.meta.outputs.stable }}" = "true" ]; then
            # Step #S-7: publish moving major (v1) + minor (v1.0)
            # aliases for stable releases so downstream pinners
            # can choose their level of update commitment:
            #   - :v1.0.1 — exact pin, never moves
            #   - :v1.0   — accepts patch updates within minor
            #   - :v1     — accepts minor + patch within major
            #   - :latest — accepts everything
            VERSION="${{ steps.meta.outputs.version }}"
            MAJOR="$(echo "$VERSION" | cut -d. -f1)"
            MINOR="$(echo "$VERSION" | cut -d. -f1-2)"          
            TAGS="${TAGS},${IMAGE}:latest"
            TAGS="${TAGS},${IMAGE}:${MAJOR}"
            TAGS="${TAGS},${IMAGE}:${MINOR}"            
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Computed tags: ${TAGS}"

      - name: Build (and push on tag, dry-run on dispatch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          # Cache to GHA's runner cache to speed up rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "## Release ${{ steps.meta.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Platforms: linux/amd64, linux/arm64" >> "$GITHUB_STEP_SUMMARY"
          echo "- Stable: ${{ steps.meta.outputs.stable }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pushed: ${{ github.event_name == 'push' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags:" >> "$GITHUB_STEP_SUMMARY"
          IFS=',' read -ra T <<< "${{ steps.tags.outputs.tags }}"
          for t in "${T[@]}"; do
            echo "  - \`${t}\`" >> "$GITHUB_STEP_SUMMARY"
          done
  build-binaries:
    name: Build native binaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push'
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Build frontend
        working-directory: web/frontend
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          OUT="arenet-linux-${{ matrix.arch }}"
          go build \
            -ldflags "-s -w -X main.version=${{ steps.meta.outputs.version }}" \
            -trimpath \
            -o "$OUT" \
            ./cmd/arenet
          chmod +x "$OUT"
          file "$OUT"
          echo "Built ${OUT} with version=${{ steps.meta.outputs.version }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: arenet-linux-${{ matrix.arch }}
          path: arenet-linux-${{ matrix.arch }}
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    needs: [build-and-publish, build-binaries]
    permissions:
      contents: write
    steps:
      - name: Resolve version + stable flag
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if printf '%s\n' "${VERSION}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            STABLE=true
          else
            STABLE=false
          fi
          echo "stable=${STABLE}" >> "$GITHUB_OUTPUT"

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: arenet-linux-*
          path: artifacts

      - name: Flatten layout + generate checksums
        run: |
          set -euo pipefail
          find artifacts -type f -name "arenet-linux-*" -exec mv {} . \;
          sha256sum arenet-linux-* > checksums.txt
          echo "Released assets:"
          ls -la arenet-linux-* checksums.txt

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          prerelease: ${{ steps.meta.outputs.stable == 'false' }}
          generate_release_notes: true
          files: |
            arenet-linux-amd64
            arenet-linux-arm64
            checksums.txt
