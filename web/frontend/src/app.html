<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- Early favicon hint for the pre-hydration fetch. SvelteKit
		     layouts override this via <svelte:head> with the Vite-
		     hashed asset (cache-bustable on rebuild) once hydrated ;
		     the static /favicon.png served by the adapter satisfies
		     the browser's initial favicon discovery before the JS
		     bundle is parsed, avoiding the default "globe" placeholder
		     flash on first paint. -->
		<link rel="icon" type="image/png" href="/favicon.png" />
		<!-- Theme bootstrap (Step F §4.3). MUST run before the SvelteKit
		     head injection so the user never sees a flash of the wrong
		     theme. Priority: cookie > localStorage > 'dark' default.
		     Empty / unknown values fall back to 'dark' via the explicit
		     `=== 'light'` guard (§4.2). Do NOT reference the literal
		     placeholder string here — SvelteKit substitutes it naively
		     across the whole template, including comments. -->
		<script>(function(){var d=document.documentElement,m=document.cookie.match(/arenet_theme=(dark|light)/);if(m){d.dataset.theme=m[1];return}try{var l=localStorage.getItem('arenet_theme');if(l==='dark'||l==='light'){d.dataset.theme=l;return}}catch(_){}d.dataset.theme='dark'})();</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
